<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUVERÄN | Digitale Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --paper: #fcfaf5; --ink: #1a1a1a; --border: #2f2f2f; --accent: #8b0000; }
        body { background-color: #dcdcdc; color: var(--ink); font-family: 'Georgia', serif; margin: 0; padding: 10px; line-height: 1.4; }
        .page { max-width: 900px; margin: 0 auto; background-color: var(--paper); box-shadow: 0 0 30px rgba(0,0,0,0.2); padding: 40px 20px; border: 1px solid #ccc; min-height: 100vh; }
        header { text-align: center; border-bottom: 4px double var(--border); margin-bottom: 25px; }
        .masthead { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; letter-spacing: -2px; text-transform: uppercase; margin: 0; }
        .sub-header { display: flex; justify-content: space-between; padding: 8px 0; font-family: Arial; font-size: 0.7rem; font-weight: bold; border-top: 1px solid var(--border); margin-top: 5px; }
        nav { display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        nav button { background: none; border: none; font-family: Arial; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; font-weight: bold; opacity: 0.5; padding: 5px 10px; }
        nav button.active { opacity: 1; border-bottom: 2px solid var(--accent); }
        .article { border-bottom: 1px solid #ddd; padding-bottom: 20px; margin-bottom: 20px; }
        .article-source { font-family: Arial; font-size: 0.65rem; text-transform: uppercase; color: var(--accent); font-weight: bold; }
        .article h3 { font-size: 1.4rem; margin: 5px 0; line-height: 1.2; }
        .article h3 a { color: var(--ink); text-decoration: none; }
        .article p { font-size: 1rem; color: #333; margin: 8px 0; }
        .loading-bar { height: 2px; background: var(--accent); width: 100%; animation: load 1.5s infinite; margin-bottom: 20px;}
        @keyframes load { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const FEEDS = {
            "Politik": [
                { n: "DLF", u: "https://www.deutschlandfunk.de/nachrichten-100.rss" },
                { n: "Tagesschau", u: "https://www.tagesschau.de/newsticker.rss" }
            ],
            "Wirtschaft": [
                { n: "Handelsblatt", u: "https://www.handelsblatt.com/contentexport/feed/topthemen/" },
                { n: "WiWo", u: "https://www.wiwo.de/contentexport/feed/rss/schlagzeilen" }
            ],
            "Technik": [
                { n: "Heise", u: "https://www.heise.de/rss/heise-atom.xml" },
                { n: "Golem", u: "https://www.golem.de/rss.php?feed=RSS2.0" }
            ]
        };

        function App() {
            const [cat, setCat] = useState("Politik");
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(false);

            const loadNews = async (category) => {
                setLoading(true);
                let all = [];
                for (const feed of FEEDS[category]) {
                    try {
                        // Verwendung von CORSProxy.io - spezialisiert auf Browser-Requests
                        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(feed.u)}`;
                        const res = await fetch(proxyUrl);
                        const xmlText = await res.text();
                        
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(xmlText, "text/xml");
                        
                        // Unterstützung für RSS (item) und Atom (entry)
                        const entries = Array.from(doc.querySelectorAll("item, entry"));

                        const parsed = entries.map(e => {
                            const title = e.querySelector("title")?.textContent || "";
                            const link = e.querySelector("link")?.textContent || e.querySelector("link")?.getAttribute("href") || "#";
                            const description = e.querySelector("description")?.textContent || e.querySelector("summary")?.textContent || "";
                            const dateStr = e.querySelector("pubDate, published, updated")?.textContent || "";
                            
                            return {
                                title,
                                link,
                                desc: description.replace(/<[^>]*>?/gm, '').substring(0, 180),
                                src: feed.n,
                                date: new Date(dateStr).getTime() || Date.now()
                            };
                        });
                        all = [...all, ...parsed];
                    } catch (err) { 
                        console.error("Fehler bei Quelle:", feed.n, err); 
                    }
                }
                setItems(all.sort((a, b) => b.date - a.date));
                setLoading(false);
            };

            useEffect(() => { loadNews(cat); }, [cat]);

            return (
                <div className="page">
                    <header>
                        <h1 className="masthead">Souverän</h1>
                        <div className="sub-header">
                            <span>10. MÄRZ 2026</span>
                            <span>STUTTGART • 10°C</span>
                            <span>NR. 01 / QUALITÄTSJOURNALISMUS</span>
                        </div>
                    </header>
                    <nav>
                        {Object.keys(FEEDS).map(c => (
                            <button key={c} className={cat === c ? "active" : ""} onClick={() => setCat(c)}>{c}</button>
                        ))}
                    </nav>
                    {loading && <div className="loading-bar"></div>}
                    <main>
                        {items.length === 0 && !loading && (
                            <p style={{textAlign:'center', color: 'var(--accent)'}}>Daten konnten nicht geladen werden. Bitte Seite aktualisieren.</p>
                        )}
                        {items.map((it, i) => (
                            <div key={i} className="article">
                                <span className="article-source">{it.src}</span>
                                <h3><a href={it.link} target="_blank" rel="noreferrer">{it.title}</a></h3>
                                <p>{it.desc}...</p>
                                <small style={{color: '#777'}}>{new Date(it.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} Uhr</small>
                            </div>
                        ))}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
