<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUVERÄN | Digitale Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --paper: #fcfaf5; --ink: #1a1a1a; --border: #2f2f2f; --accent: #8b0000; --dim: #666; --gold: #b8860b; --opinion: #f4f1ea; }
        
        body { background-color: #dcdcdc; color: var(--ink); font-family: 'Georgia', serif; margin: 0; padding: 0; }
        
        .page { 
            max-width: 1100px; 
            margin: 20px auto; 
            background-color: var(--paper); 
            box-shadow: 0 0 50px rgba(0,0,0,0.2); 
            padding: 5%; 
            border: 1px solid #aaa; 
            min-height: 100vh; 
        }

        header { text-align: center; border-bottom: 3px double var(--border); margin-bottom: 25px; }
        
        .masthead { 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            font-weight: 900; 
            letter-spacing: -1px; 
            text-transform: uppercase; 
            margin: 0; 
            line-height: 1;
        }

        .meta-line { 
            font-family: Arial, sans-serif; 
            font-weight: bold; 
            border-top: 1px solid black; 
            margin-top: 10px; 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0;
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            text-transform: uppercase;
        }

        nav { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
            flex-wrap: wrap;
        }
        
        nav button { 
            background: none; 
            border: none; 
            font-family: Arial, sans-serif; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            cursor: pointer; 
            font-weight: bold; 
            opacity: 0.5; 
            padding: 5px;
        }
        nav button.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        .content-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 40px; }
        
        @media (max-width: 850px) { 
            .content-grid { grid-template-columns: 1fr; } 
            .page { margin: 0; border: none; padding: 20px; }
        }

        .article { border-bottom: 1px solid #ccc; padding-bottom: 25px; margin-bottom: 25px; position: relative; }
        /* Spezielles Styling für Debatte */
        .article.is-opinion { background-color: var(--opinion); padding: 20px; border: 1px solid #ddd; border-left: 5px solid var(--accent); }

        .article-source { font-family: Arial, sans-serif; font-size: 0.65rem; color: var(--accent); font-weight: 900; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        .bookmark-btn { cursor: pointer; font-size: 1.1rem; filter: grayscale(1); opacity: 0.4; }
        .bookmark-btn.active { filter: grayscale(0); opacity: 1; }

        .article h3 { font-size: 1.6rem; margin: 0 0 12px 0; line-height: 1.1; }
        .article h3 a { color: var(--ink); text-decoration: none; }
        .article p { font-size: 1.05rem; line-height: 1.4; color: #222; margin: 0; text-align: justify; }
        
        .cluster-box { background: #f0ede6; padding: 12px; margin-top: 15px; border-left: 4px solid var(--gold); font-size: 0.85rem; }
        .cluster-tag { font-family: Arial; font-weight: bold; color: var(--gold); font-size: 0.6rem; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        .sidebar-title { font-family: Arial, sans-serif; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--ink); padding-bottom: 5px; margin-bottom: 15px; font-size: 0.85rem; }
        
        .loading-bar { height: 3px; background: var(--accent); width: 100%; animation: load 2s infinite; margin-bottom: 30px;}
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .sidebar-item { font-size: 0.9rem; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .sidebar-item a { text-decoration: none; color: inherit; font-weight: bold; line-height: 1.2; display: block; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const FEEDS = {
            "Politik": [
                { n: "DLF", u: "https://www.deutschlandfunk.de/nachrichten-100.rss" },
                { n: "Tagesschau", u: "https://www.tagesschau.de/newsticker.rss" }
            ],
            "Wirtschaft": [
                { n: "Handelsblatt", u: "https://www.handelsblatt.com/contentexport/feed/topthemen/" },
                { n: "WiWo", u: "https://www.wiwo.de/contentexport/feed/rss/schlagzeilen" }
            ],
            "Debatte": [
                { n: "Eurotopics", u: "https://www.eurotopics.net/de/home/rss/" },
                { n: "NZZ Meinung", u: "https://www.nzz.ch/meinung.rss" },
                { n: "Cicero", u: "https://www.cicero.de/rss.xml" }
            ],
            "Technik": [
                { n: "Heise", u: "https://www.heise.de/rss/heise-atom.xml" },
                { n: "Golem", u: "https://www.golem.de/rss.php?feed=RSS2.0" }
            ]
        };

        const fixEncoding = (t) => {
            if (!t) return "";
            const d = new DOMParser().parseFromString(t, 'text/html');
            return d.documentElement.textContent
                .replace(/Ã¤/g, 'ä').replace(/Ã¶/g, 'ö').replace(/Ã¼/g, 'ü')
                .replace(/Ã„/g, 'Ä').replace(/Ã–/g, 'Ö').replace(/Ãœ/g, 'Ü')
                .replace(/ÃŸ/g, 'ß').replace(/â€“/g, '–').replace(/Â/g, '');
        };

        function App() {
            const [cat, setCat] = useState("Politik");
            const [rawItems, setRawItems] = useState([]);
            const [bookmarks, setBookmarks] = useState(JSON.parse(localStorage.getItem('bookmarks') || '[]'));
            const [loading, setLoading] = useState(false);

            useEffect(() => { localStorage.setItem('bookmarks', JSON.stringify(bookmarks)); }, [bookmarks]);

            const loadNews = async (c) => {
                setLoading(true);
                let all = [];
                for (const f of FEEDS[c]) {
                    try {
                        const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(f.u)}`);
                        const buf = await res.arrayBuffer();
                        const xml = new TextDecoder('utf-8').decode(buf);
                        const doc = new DOMParser().parseFromString(xml, "text/xml");
                        const entries = Array.from(doc.querySelectorAll("item, entry"));
                        all = [...all, ...entries.map(e => ({
                            id: e.querySelector("link")?.textContent || Math.random().toString(),
                            title: fixEncoding(e.querySelector("title")?.textContent || ""),
                            link: e.querySelector("link")?.textContent || e.querySelector("link")?.getAttribute("href") || "#",
                            desc: fixEncoding(e.querySelector("description, summary")?.textContent || "").replace(/<[^>]*>?/gm, '').substring(0, 250),
                            src: f.n,
                            date: new Date(e.querySelector("pubDate, published, updated")?.textContent).getTime() || Date.now(),
                            isOpinion: c === "Debatte"
                        }))];
                    } catch (e) { console.error(e); }
                }
                setRawItems(all.sort((a, b) => b.date - a.date));
                setLoading(false);
            };

            useEffect(() => { loadNews(cat); }, [cat]);

            const clusteredItems = useMemo(() => {
                let processed = [];
                let skipIds = new Set();
                rawItems.forEach(item => {
                    if (skipIds.has(item.id)) return;
                    const keywords = item.title.toLowerCase().split(/\W+/).filter(w => w.length > 5);
                    const perspectives = rawItems.filter(other => {
                        if (other.id === item.id) return false;
                        return keywords.some(k => other.title.toLowerCase().includes(k));
                    });
                    perspectives.forEach(p => skipIds.add(p.id));
                    processed.push({ ...item, perspectives });
                });
                return processed;
            }, [rawItems]);

            const toggleBookmark = (it) => {
                if (bookmarks.find(b => b.id === it.id)) setBookmarks(bookmarks.filter(b => b.id !== it.id));
                else setBookmarks([it, ...bookmarks]);
            };

            return (
                <div className="page">
                    <header>
                        <h1 className="masthead">Souverän</h1>
                        <div className="meta-line">
                            <span>DIENSTAG, 10. MÄRZ 2026</span>
                            <span>REDAKTION STUTTGART</span>
                            <span>NR. 124</span>
                        </div>
                    </header>

                    <nav>
                        {Object.keys(FEEDS).map(c => (
                            <button key={c} className={cat === c ? "active" : ""} onClick={() => setCat(c)}>{c}</button>
                        ))}
                    </nav>

                    {loading && <div className="loading-bar"></div>}

                    <div className="content-grid">
                        <main>
                            {clusteredItems.slice(0, 15).map((it, i) => (
                                <div key={i} className={`article ${it.isOpinion ? 'is-opinion' : ''}`}>
                                    <div className="article-source">
                                        <span>{it.src} • {new Date(it.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                        <span className={`bookmark-btn ${bookmarks.find(b => b.id === it.id) ? 'active' : ''}`}
                                              onClick={() => toggleBookmark(it)}>🔖</span>
                                    </div>
                                    <h3><a href={it.link} target="_blank" rel="noreferrer">{it.title}</a></h3>
                                    <p>{it.desc}...</p>
                                    
                                    {it.perspectives.length > 0 && (
                                        <div className="cluster-box">
                                            <span className="cluster-tag">Andere Perspektiven ({it.perspectives.length})</span>
                                            {it.perspectives.map((p, pi) => (
                                                <div key={pi} style={{marginBottom: '5px'}}>
                                                    <strong>{p.src}:</strong> <a href={p.link} target="_blank" rel="noreferrer" style={{color: 'inherit', textDecoration: 'none'}}>{p.title}</a>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </main>

                        <aside>
                            <div className="sidebar-title">Gemerkt ({bookmarks.length})</div>
                            {bookmarks.length === 0 && <p style={{fontSize: '0.8rem', color: '#888'}}>Artikel mit 🔖 markieren.</p>}
                            {bookmarks.map((b, i) => (
                                <div key={i} className="sidebar-item">
                                    <a href={b.link} target="_blank" rel="noreferrer">{b.title}</a>
                                    <small style={{color: 'var(--accent)', cursor: 'pointer', fontFamily: 'Arial'}} onClick={() => toggleBookmark(b)}>[Entfernen]</small>
                                </div>
                            ))}
                        </aside>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
