<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUVERÄN | Ultima Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --paper: #fcfaf5; --ink: #1a1a1a; --border: #2f2f2f; --accent: #8b0000; --dim: #666; --gold: #b8860b; }
        
        @media print {
            body::before, nav, header, .reader-controls, .bookmark-btn, .reader-overlay { display: none !important; }
            .reader-content { box-shadow: none !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; padding: 0 !important; }
            .page { box-shadow: none !important; border: none !important; }
            body { background: white !important; }
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04; pointer-events: none; z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        body { background-color: #dcdcdc; color: var(--ink); font-family: 'Georgia', serif; margin: 0; padding: 0; overflow-x: hidden; }
        .page { max-width: 1100px; margin: 10px auto; background-color: var(--paper); box-shadow: 0 0 50px rgba(0,0,0,0.2); padding: 5%; border: 1px solid #aaa; min-height: 100vh; position: relative; width: 95%; box-sizing: border-box; }
        
        header { text-align: center; border-bottom: 3px double var(--border); margin-bottom: 25px; padding-bottom: 10px; position: relative; }
        .dedication { position: absolute; top: 0; right: 0; font-family: Arial; font-size: 0.8rem; color: var(--gold); font-weight: bold; opacity: 0.8; }
        .masthead { font-size: clamp(2.2rem, 10vw, 4.5rem); font-weight: 900; letter-spacing: -1px; text-transform: uppercase; margin: 0; line-height: 1; cursor: pointer; }
        .slogan { font-family: Arial; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-top: 5px; font-weight: bold; }
        .meta-line { font-family: Arial, sans-serif; font-weight: bold; border-top: 1px solid black; margin-top: 15px; display: flex; justify-content: space-between; padding: 8px 0; font-size: clamp(0.55rem, 2vw, 0.75rem); text-transform: uppercase; align-items: center; }
        
        nav { display: flex; justify-content: center; gap: clamp(10px, 2vw, 20px); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        nav button { background: none; border: none; font-family: Arial; text-transform: uppercase; font-size: 0.85rem; cursor: pointer; font-weight: bold; opacity: 0.5; padding: 5px; transition: 0.2s; }
        nav button.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        .content-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 40px; }
        @media (max-width: 850px) { .content-grid { grid-template-columns: 1fr; } }
        
        .reader-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.96); z-index: 1000; overflow-y: auto; }
        .reader-content { background: var(--paper); max-width: 750px; width: 92%; margin: 40px auto; padding: clamp(20px, 5vw, 50px); box-shadow: 0 0 100px black; box-sizing: border-box; overflow-wrap: break-word; position: relative; }
        
        .reader-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .reader-body { line-height: 1.8; font-size: 1.15rem; }
        .reader-body img { display: block !important; float: none !important; clear: both !important; max-width: 300px !important; height: auto !important; margin: 30px auto !important; border: 1px solid #ddd; padding: 5px; background: #fff; }

        /* Titelseiten Fixes */
        .cover-story { text-align: center; border-bottom: 2px solid var(--ink); padding-bottom: 30px; margin-bottom: 30px; width: 100%; box-sizing: border-box; }
        .cover-story h2 { font-size: clamp(1.4rem, 4vw, 2.5rem); margin: 10px 0; cursor: pointer; line-height: 1.1; overflow-wrap: break-word; }
        .sub-stories { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; border-bottom: 1px solid #ccc; padding-bottom: 30px; margin-bottom: 30px; width: 100%; box-sizing: border-box; }
        .sub-stories h3 { font-size: 1.2rem; cursor: pointer; margin: 5px 0; overflow-wrap: break-word; }
        @media (max-width: 600px) { .sub-stories { grid-template-columns: 1fr; } }

        .article { border-bottom: 1px solid #ccc; padding-bottom: 25px; margin-bottom: 25px; }
        .article h3 { font-size: 1.5rem; margin: 0 0 10px 0; line-height: 1.2; cursor: pointer; transition: color 0.2s; }
        .article-source { font-family: Arial; font-size: 0.65rem; color: var(--accent); font-weight: 900; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .quote-box { font-style: italic; color: var(--dim); padding: 25px; border: 1px dashed #ccc; background: #fffdf9; margin-top: 10px; line-height: 1.4; position: relative; }
        .cluster-box { background: #f0ede6; padding: 12px; margin-top: 15px; border-left: 4px solid var(--gold); font-size: 0.85rem; }
        .loading-bar { height: 3px; background: var(--accent); width: 100%; animation: load 2s infinite; margin-bottom: 30px;}
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const QUOTES = [
            "Souveränität bedeutet nicht, alles zu wissen, sondern die Quellen zu kennen, denen man vertraut.",
            "Sapere aude! Habe Mut, dich deines eigenen Verstandes zu bedienen. – Immanuel Kant",
            "Das Glück deines Lebens hängt von der Beschaffenheit deiner Gedanken ab. – Marc Aurel",
            "Wer die Freiheit aufgibt, um Sicherheit zu gewinnen, wird am Ende beides verlieren. – Benjamin Franklin",
            "Nichts auf der Welt ist so mächtig wie eine Idee, deren Zeit gekommen ist. – Victor Hugo"
        ];

        const FEEDS = {
            "Politik": [
                { n: "Bundestag (hib)", u: "https://www.bundestag.de/static/rss/hib.xml" },
                { n: "DLF", u: "https://www.deutschlandfunk.de/nachrichten-100.rss" },
                { n: "DW", u: "https://rss.dw.com/xml/rss-de-all" }
            ],
            "Wirtschaft": [
                { n: "Finanzwelt", u: "https://finanzmarktwelt.de/feed/" },
                { n: "WiWo", u: "https://www.wiwo.de/contentexport/feed/rss/schlagzeilen" }
            ],
            "Wissen": [
                { n: "Telepolis", u: "https://www.telepolis.de/news-atom.xml" },
                { n: "LobbyControl", u: "https://www.lobbycontrol.de/feed/" },
                { n: "Spektrum", u: "https://www.spektrum.de/rss/spektrum-alle-news.xml" },
                { n: "Correctiv", u: "https://correctiv.org/feed/" }
            ],
            "Sport": [
                { n: "Sportschau", u: "https://www.sportschau.de/index~rss2.xml" },
                { n: "Kicker", u: "https://newsfeed.kicker.de/news/aktuell" }
            ]
        };

        const safeDecode = (buf) => {
            const u8 = new Uint8Array(buf);
            const utf8 = new TextDecoder('utf-8').decode(u8);
            return (utf8.includes('Ã') || utf8.includes('\uFFFD')) ? new TextDecoder('iso-8859-1').decode(u8) : utf8;
        };

        function App() {
            const [cat, setCat] = useState("Home");
            const [items, setItems] = useState([]);
            const [homeItems, setHomeItems] = useState([]);
            const [bookmarks, setBookmarks] = useState(JSON.parse(localStorage.getItem('souveran_vfinal') || '[]'));
            const [loading, setLoading] = useState(false);
            const [weather, setWeather] = useState({ temp: "...", icon: "☀️" });
            const [activeArt, setActiveArt] = useState(null);
            const [quoteIdx, setQuoteIdx] = useState(Math.floor(Math.random() * QUOTES.length));

            useEffect(() => { localStorage.setItem('souveran_vfinal', JSON.stringify(bookmarks)); }, [bookmarks]);
            useEffect(() => {
                fetch("https://api.open-meteo.com/v1/forecast?latitude=48.78&longitude=9.18&current_weather=true")
                    .then(r => r.json()).then(d => setWeather({ temp: `${Math.round(d.current_weather.temperature)}°C`, icon: "☀️" }));
                loadHomeData();
            }, []);

            const loadHomeData = async () => {
                try {
                    // Verwende DLF für die Titelseite als zuverlässigste Quelle
                    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent("https://www.deutschlandfunk.de/nachrichten-100.rss")}`);
                    const buf = await res.arrayBuffer();
                    const doc = new DOMParser().parseFromString(safeDecode(buf), "text/xml");
                    const entries = Array.from(doc.querySelectorAll("item, entry")).slice(0, 5).map(e => ({
                        id: e.querySelector("link")?.textContent || Math.random().toString(),
                        title: (e.querySelector("title")?.textContent || "").trim(),
                        link: e.querySelector("link")?.textContent || "#",
                        desc: (e.querySelector("description, summary")?.textContent || "").replace(/<[^>]*>?/gm, ''),
                        full: e.querySelector("content\\:encoded, description")?.textContent || "",
                        src: "DLF"
                    }));
                    setHomeItems(entries);
                } catch (e) { console.error("Home Load Error", e); }
            };

            const load = async (c) => {
                if (c === "Home") return;
                setLoading(true);
                let all = [];
                for (const f of FEEDS[c]) {
                    try {
                        const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(f.u)}`);
                        const buf = await res.arrayBuffer();
                        const doc = new DOMParser().parseFromString(safeDecode(buf), "text/xml");
                        const entries = Array.from(doc.querySelectorAll("item, entry")).map(e => ({
                            id: e.querySelector("link")?.textContent || Math.random().toString(),
                            title: (e.querySelector("title")?.textContent || "").trim(),
                            link: e.querySelector("link")?.textContent || e.querySelector("link")?.getAttribute("href") || "#",
                            desc: (e.querySelector("description, summary")?.textContent || "").replace(/<[^>]*>?/gm, ''),
                            full: e.querySelector("content\\:encoded, description")?.textContent || "",
                            src: f.n,
                            date: new Date(e.querySelector("pubDate, published, updated")?.textContent).getTime() || Date.now()
                        }));
                        all = [...all, ...entries];
                    } catch (e) { console.warn(`Feed ${f.n} failed`); }
                }
                setItems(all.sort((a, b) => b.date - a.date));
                setLoading(false);
            };

            useEffect(() => { load(cat); }, [cat]);

            const clustered = useMemo(() => {
                let processed = []; let skip = new Set();
                items.forEach(it => {
                    if (skip.has(it.id)) return;
                    const keys = it.title.toLowerCase().split(/\W+/).filter(w => w.length > 5);
                    const pers = items.filter(o => o.id !== it.id && keys.some(k => o.title.toLowerCase().includes(k)));
                    pers.forEach(p => skip.add(p.id));
                    processed.push({ ...it, pers });
                });
                return processed;
            }, [items]);

            return (
                <div className="page">
                    {activeArt && (
                        <div className="reader-overlay">
                            <div className="reader-content">
                                <div className="reader-controls">
                                    <button onClick={() => setActiveArt(null)} style={{cursor:'pointer', border:'none', background:'none', fontWeight:'bold', fontFamily:'Arial'}}>← ZURÜCK</button>
                                    <button onClick={() => window.print()} style={{cursor:'pointer', border:'none', background:'none', color:'var(--gold)', fontWeight:'bold', fontSize:'0.7rem'}}>PDF ARCHIV</button>
                                </div>
                                <span style={{display:'block', fontFamily:'Arial', color:'var(--accent)', fontSize:'0.7rem', fontWeight:'900', marginBottom:'10px'}}>{activeArt.src}</span>
                                <h2 style={{fontSize:'1.8rem', lineHeight:1.1, marginBottom:'30px'}}>{activeArt.title}</h2>
                                <div className="reader-body" dangerouslySetInnerHTML={{ __html: activeArt.full || activeArt.desc }}></div>
                                <a href={activeArt.link} target="_blank" rel="noreferrer" style={{display:'block', marginTop:'50px', color:'var(--accent)', fontWeight:'bold', textDecoration:'none', border:'1px solid var(--accent)', padding:'15px', textAlign:'center', fontFamily:'Arial'}}>QUELLE BESUCHEN</a>
                            </div>
                        </div>
                    )}

                    <header>
                        <div className="dedication">A³ ❤️</div>
                        <h1 className="masthead" onClick={() => setCat("Home")}>Souverän</h1>
                        <div className="slogan">Fakten statt Lärm</div>
                        <div className="meta-line">
                            <span>11. MÄRZ 2026</span>
                            <span>{weather.icon} {weather.temp} STUTTGART</span>
                            <span>NR. 124 | GOLDEN MASTER</span>
                        </div>
                    </header>

                    <nav>
                        <button className={cat === "Home" ? "active" : ""} onClick={() => setCat("Home")}>Titelseite</button>
                        {Object.keys(FEEDS).map(c => <button key={c} className={cat === c ? "active" : ""} onClick={() => setCat(c)}>{c}</button>)}
                    </nav>

                    {loading && <div className="loading-bar"></div>}

                    {cat === "Home" ? (
                        <div className="cover-page">
                            {homeItems.length > 0 ? (
                                <>
                                    <div className="cover-story">
                                        <span style={{fontSize:'0.7rem', fontWeight:'bold', color:'var(--accent)'}}>TOP-THEMA</span>
                                        <h2 onClick={() => setActiveArt(homeItems[0])}>{homeItems[0].title}</h2>
                                        <p style={{maxWidth:'750px', margin:'10px auto', fontSize:'1.15rem'}}>{homeItems[0].desc.substring(0, 250)}...</p>
                                    </div>
                                    <div className="sub-stories">
                                        <div>
                                            <span style={{fontSize:'0.6rem', color: 'var(--gold)', fontWeight:'bold'}}>POLITIK</span>
                                            <h3 onClick={() => setActiveArt(homeItems[1])}>{homeItems[1].title}</h3>
                                        </div>
                                        <div style={{borderLeft: '1px solid #ccc', paddingLeft: '20px'}}>
                                            <span style={{fontSize:'0.6rem', color: 'var(--gold)', fontWeight:'bold'}}>MELDUNG</span>
                                            <h3 onClick={() => setActiveArt(homeItems[2])}>{homeItems[2].title}</h3>
                                        </div>
                                    </div>
                                </>
                            ) : <div style={{padding:'40px', textAlign:'center'}}>Lade Weltlage...</div>}
                            
                            <div className="content-grid">
                                <div style={{textAlign:'left'}}>
                                    <h4 style={{fontFamily:'Arial', borderBottom:'1px solid black', paddingBottom:'5px'}}>BIBLIOTHEK</h4>
                                    {bookmarks.slice(0, 5).map((b, i) => <div key={i} onClick={() => setActiveArt(b)} style={{cursor:'pointer', fontWeight:'bold', marginBottom:'12px', fontSize:'0.95rem', borderBottom:'1px solid #eee', paddingBottom:'5px'}}>{b.title}</div>)}
                                    {bookmarks.length === 0 && <p style={{fontSize:'0.85rem', color:'#888'}}>Markiere Artikel mit 🔖.</p>}
                                </div>
                                <div className="quote-box">
                                    "{QUOTES[quoteIdx]}"
                                    <div onClick={() => setQuoteIdx((quoteIdx + 1) % QUOTES.length)} style={{fontSize:'0.65rem', marginTop:'15px', cursor:'pointer', color:'var(--accent)', fontWeight:'bold', textAlign:'right'}}>[NÄCHSTER IMPULS]</div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="content-grid">
                            <main>
                                {clustered.slice(0, 15).map((it, i) => (
                                    <div key={i} className="article">
                                        <div className="article-source">
                                            <span>{it.src}</span>
                                            <span onClick={() => {
                                                if (bookmarks.find(b => b.id === it.id)) setBookmarks(bookmarks.filter(b => b.id !== it.id));
                                                else setBookmarks([it, ...bookmarks]);
                                            }} style={{cursor:'pointer', opacity: bookmarks.find(b => b.id === it.id) ? 1 : 0.4}}>🔖</span>
                                        </div>
                                        <h3 onClick={() => setActiveArt(it)}>{it.title}</h3>
                                        <p>{it.desc.substring(0, 220)}...</p>
                                        {it.pers && it.pers.length > 0 && (
                                            <div className="cluster-box">
                                                <span style={{fontSize:'0.65rem', fontWeight:'900', color:'var(--gold)', display:'block', marginBottom:'8px'}}>WEITERE PERSPEKTIVEN</span>
                                                {it.pers.map((p, pi) => <div key={pi} onClick={() => setActiveArt(p)} style={{cursor:'pointer', marginBottom:'5px'}}><strong>{p.src}:</strong> {p.title}</div>)}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </main>
                            <aside>
                                <div style={{fontFamily:'Arial', fontWeight:'bold', borderBottom:'2px solid black', marginBottom:'15px', fontSize:'0.85rem'}}>ARCHIV</div>
                                {bookmarks.map((b, i) => (
                                    <div key={i} style={{fontSize:'0.9rem', marginBottom:'15px', borderBottom:'1px solid #eee', paddingBottom:'10px'}}>
                                        <span onClick={() => setActiveArt(b)} style={{cursor:'pointer', fontWeight:'bold', display:'block'}}>{b.title}</span>
                                        <div onClick={() => setBookmarks(bookmarks.filter(o => o.id !== b.id))} style={{color:'var(--accent)', cursor:'pointer', fontSize:'0.7rem', marginTop:'5px'}}>[ENTFERNEN]</div>
                                    </div>
                                ))}
                            </aside>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
