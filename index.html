<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUVERÄN | Digitale Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --paper: #fcfaf5; --ink: #1a1a1a; --border: #2f2f2f; --accent: #8b0000; --dim: #666; }
        body { background-color: #dcdcdc; color: var(--ink); font-family: 'Georgia', serif; margin: 0; padding: 10px; line-height: 1.4; }
        .page { max-width: 1100px; margin: 0 auto; background-color: var(--paper); box-shadow: 0 0 40px rgba(0,0,0,0.2); padding: 40px; border: 1px solid #ccc; min-height: 100vh; }
        
        /* Ticker - verlangsamt und mit Hover-Stopp */
        .ticker-wrap { background: var(--ink); color: white; padding: 8px 0; overflow: hidden; font-family: Arial, sans-serif; font-size: 0.75rem; text-transform: uppercase; margin: -40px -40px 30px -40px; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .ticker { display: flex; white-space: nowrap; animation: ticker 120s linear infinite; width: fit-content; }
        .ticker:hover { animation-play-state: paused; cursor: pointer; }
        .ticker span { padding: 0 40px; font-weight: bold; letter-spacing: 1px; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        header { text-align: center; border-bottom: 5px double var(--border); margin-bottom: 30px; padding-top: 10px; }
        .masthead { font-size: clamp(2.5rem, 12vw, 5.5rem); font-weight: 900; letter-spacing: -3px; text-transform: uppercase; margin: 0; line-height: 0.85; }
        .sub-header { display: flex; justify-content: space-between; padding: 12px 0; font-family: Arial; font-size: 0.75rem; font-weight: bold; border-top: 1px solid var(--border); margin-top: 10px; }
        
        nav { display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 35px; flex-wrap: wrap; }
        nav button { background: none; border: none; font-family: Arial; text-transform: uppercase; font-size: 0.85rem; cursor: pointer; font-weight: bold; opacity: 0.4; transition: 0.3s; padding: 5px 15px; }
        nav button:hover { opacity: 0.8; }
        nav button.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }

        .content-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 50px; }
        @media (max-width: 850px) { .content-grid { grid-template-columns: 1fr; } }

        .article { border-bottom: 1px solid #ddd; padding-bottom: 30px; margin-bottom: 30px; display: flex; flex-direction: column; }
        .article-source { font-family: Arial; font-size: 0.7rem; text-transform: uppercase; color: var(--accent); font-weight: 800; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .new-tag { background: var(--accent); color: white; padding: 2px 6px; border-radius: 2px; font-size: 0.6rem; }
        .article h3 { font-size: 1.85rem; margin: 0 0 15px 0; line-height: 1.1; font-weight: bold; letter-spacing: -0.5px; }
        .article h3 a { color: var(--ink); text-decoration: none; }
        .article h3 a:hover { color: #444; text-decoration: underline; }
        .article p { font-size: 1.1rem; color: #222; margin: 0; text-align: justify; }
        
        .sidebar-title { font-family: Arial; font-size: 1rem; border-bottom: 3px solid var(--ink); padding-bottom: 5px; margin-bottom: 20px; text-transform: uppercase; font-weight: 900; }
        .sidebar-item { border-bottom: 1px solid #eee; padding: 15px 0; font-size: 0.95rem; }
        .sidebar-item:first-child { padding-top: 0; }
        .sidebar-item a { text-decoration: none; color: inherit; font-weight: bold; line-height: 1.3; display: block; }
        .sidebar-item a:hover { color: var(--accent); }

        .loading-bar { height: 4px; background: var(--accent); width: 100%; animation: load 2s infinite; margin-bottom: 30px;}
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .footer-info { margin-top: 50px; border-top: 1px solid var(--border); padding-top: 20px; font-family: Arial; font-size: 0.7rem; color: var(--dim); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const FEEDS = {
            "Politik": [
                { n: "DLF", u: "https://www.deutschlandfunk.de/nachrichten-100.rss" },
                { n: "Tagesschau", u: "https://www.tagesschau.de/newsticker.rss" }
            ],
            "Wirtschaft": [
                { n: "Handelsblatt", u: "https://www.handelsblatt.com/contentexport/feed/topthemen/" },
                { n: "WiWo", u: "https://www.wiwo.de/contentexport/feed/rss/schlagzeilen" }
            ],
            "Sport": [
                { n: "Kicker", u: "https://newsfeed.kicker.de/news/aktuell" },
                { n: "Sportschau", u: "https://www.sportschau.de/index~rss2.xml" }
            ],
            "Technik": [
                { n: "Heise", u: "https://www.heise.de/rss/heise-atom.xml" },
                { n: "Golem", u: "https://www.golem.de/rss.php?feed=RSS2.0" }
            ]
        };

        const fixEncoding = (text) => {
            if (!text) return "";
            const doc = new DOMParser().parseFromString(text, 'text/html');
            return doc.documentElement.textContent
                .replace(/Ã¤/g, 'ä').replace(/Ã¶/g, 'ö').replace(/Ã¼/g, 'ü')
                .replace(/Ã„/g, 'Ä').replace(/Ã–/g, 'Ö').replace(/Ãœ/g, 'Ü')
                .replace(/ÃŸ/g, 'ß').replace(/â€“/g, '–').replace(/Â/g, '');
        };

        function App() {
            const [cat, setCat] = useState("Politik");
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(false);

            const loadNews = async (category) => {
                setLoading(true);
                let all = [];
                for (const feed of FEEDS[category]) {
                    try {
                        const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(feed.u)}`);
                        const buffer = await res.arrayBuffer();
                        const xmlText = new TextDecoder('utf-8').decode(buffer);
                        const doc = new DOMParser().parseFromString(xmlText, "text/xml");
                        const entries = Array.from(doc.querySelectorAll("item, entry"));

                        const parsed = entries.map(e => {
                            const date = new Date(e.querySelector("pubDate, published, updated")?.textContent).getTime() || Date.now();
                            return {
                                title: fixEncoding(e.querySelector("title")?.textContent || ""),
                                link: e.querySelector("link")?.textContent || e.querySelector("link")?.getAttribute("href") || "#",
                                desc: fixEncoding(e.querySelector("description")?.textContent || e.querySelector("summary")?.textContent || "").replace(/<[^>]*>?/gm, '').substring(0, 250),
                                src: feed.n,
                                date: date,
                                isNew: (Date.now() - date) < 3600000 
                            };
                        });
                        all = [...all, ...parsed];
                    } catch (err) { console.error(err); }
                }
                setItems(all.sort((a, b) => b.date - a.date));
                setLoading(false);
            };

            useEffect(() => { loadNews(cat); }, [cat]);

            return (
                <div className="page">
                    <div className="ticker-wrap">
                        <div className="ticker">
                            {items.length > 0 ? items.concat(items).map((it, i) => (
                                <span key={i}>+++ {it.title} +++</span>
                            )) : <span>SOUVERÄN ANALYSIERT DIE LAGE...</span>}
                        </div>
                    </div>

                    <header>
                        <h1 className="masthead">Souverän</h1>
                        <div className="sub-header">
                            <span>DIENSTAG, 10. MÄRZ 2026</span>
                            <span>STUTTGART • 11°C</span>
                            <span>QUALITÄTSJOURNALISMUS</span>
                        </div>
                    </header>
                    
                    <nav>
                        {Object.keys(FEEDS).map(c => (
                            <button key={c} className={cat === c ? "active" : ""} onClick={() => setCat(c)}>{c}</button>
                        ))}
                    </nav>

                    {loading && <div className="loading-bar"></div>}

                    <div className="content-grid">
                        <main>
                            {items.slice(0, 10).map((it, i) => (
                                <div key={i} className="article">
                                    <span className="article-source">
                                        {it.src} {it.isNew && <span className="new-tag">NEU</span>}
                                    </span>
                                    <h3><a href={it.link} target="_blank" rel="noreferrer">{it.title}</a></h3>
                                    <p>{it.desc}...</p>
                                    <small style={{color: 'var(--dim)', marginTop: '15px', fontStyle: 'italic', fontSize: '0.75rem'}}>
                                        Veröffentlicht um {new Date(it.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} Uhr
                                    </small>
                                </div>
                            ))}
                        </main>
                        
                        <aside>
                            <div className="sidebar-title">Kurz gefasst</div>
                            {items.slice(10, 25).map((it, i) => (
                                <div key={i} className="sidebar-item">
                                    <span className="article-source" style={{fontSize: '0.6rem', marginBottom: '4px'}}>{it.src}</span>
                                    <a href={it.link} target="_blank" rel="noreferrer">{it.title}</a>
                                </div>
                            ))}
                        </aside>
                    </div>
                    <footer className="footer-info">
                        © 2026 SOUVERÄN DIGITAL • REDAKTION STUTTGART • UNABHÄNGIG & OBJEKTIV
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
