<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUVERÄN | Digitale Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --paper: #fcfaf5; --ink: #1a1a1a; --border: #2f2f2f; --accent: #8b0000; }
        body { background-color: #dcdcdc; color: var(--ink); font-family: 'Georgia', serif; margin: 0; padding: 10px; line-height: 1.4; }
        .page { max-width: 1000px; margin: 0 auto; background-color: var(--paper); box-shadow: 0 0 30px rgba(0,0,0,0.2); padding: 40px 20px; border: 1px solid #ccc; min-height: 100vh; }
        
        /* Ticker */
        .ticker-wrap { background: var(--ink); color: white; padding: 6px 0; overflow: hidden; font-family: Arial, sans-serif; font-size: 0.75rem; text-transform: uppercase; margin: -40px -20px 30px -20px; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .ticker { display: flex; white-space: nowrap; animation: ticker 60s linear infinite; width: fit-content; }
        .ticker span { padding: 0 30px; font-weight: bold; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        header { text-align: center; border-bottom: 4px double var(--border); margin-bottom: 25px; padding-top: 10px; }
        .masthead { font-size: clamp(2.5rem, 10vw, 4.5rem); font-weight: 900; letter-spacing: -2px; text-transform: uppercase; margin: 0; }
        .sub-header { display: flex; justify-content: space-between; padding: 8px 0; font-family: Arial; font-size: 0.7rem; font-weight: bold; border-top: 1px solid var(--border); margin-top: 5px; }
        
        nav { display: flex; justify-content: center; gap: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        nav button { background: none; border: none; font-family: Arial; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; font-weight: bold; opacity: 0.4; transition: 0.3s; }
        nav button.active { opacity: 1; border-bottom: 2px solid var(--accent); color: var(--accent); }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }

        .article { border-bottom: 1px solid #ddd; padding-bottom: 25px; margin-bottom: 25px; }
        .article-source { font-family: Arial; font-size: 0.65rem; text-transform: uppercase; color: var(--accent); font-weight: bold; margin-bottom: 5px; display: block; }
        .article h3 { font-size: 1.6rem; margin: 5px 0 12px 0; line-height: 1.1; font-weight: bold; }
        .article h3 a { color: var(--ink); text-decoration: none; }
        .article p { font-size: 1.05rem; color: #333; margin: 10px 0; }
        
        .sidebar-title { font-family: Arial; font-size: 0.9rem; border-bottom: 2px solid var(--ink); padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; }
        .sidebar-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }
        .sidebar-item a { text-decoration: none; color: inherit; font-weight: bold; }

        .loading-bar { height: 3px; background: var(--accent); width: 100%; animation: load 2s infinite; margin-bottom: 20px;}
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const FEEDS = {
            "Politik": [
                { n: "DLF", u: "https://www.deutschlandfunk.de/nachrichten-100.rss" },
                { n: "Tagesschau", u: "https://www.tagesschau.de/newsticker.rss" }
            ],
            "Wirtschaft": [
                { n: "Handelsblatt", u: "https://www.handelsblatt.com/contentexport/feed/topthemen/" },
                { n: "WiWo", u: "https://www.wiwo.de/contentexport/feed/rss/schlagzeilen" }
            ],
            "Sport": [
                { n: "Kicker", u: "https://newsfeed.kicker.de/news/aktuell" },
                { n: "Sportschau", u: "https://www.sportschau.de/index~rss2.xml" }
            ],
            "Technik": [
                { n: "Heise", u: "https://www.heise.de/rss/heise-atom.xml" },
                { n: "Golem", u: "https://www.golem.de/rss.php?feed=RSS2.0" }
            ]
        };

        // Komplexe Korrektur für Umlaute (UTF-8 / ISO Mischmasch)
        const fixEncoding = (text) => {
            if (!text) return "";
            try {
                // Versuche HTML Entities zu dekodieren
                const doc = new DOMParser().parseFromString(text, 'text/html');
                let decoded = doc.documentElement.textContent;
                
                // Manuelle Korrektur für häufige Fehl-Kodierungen (ISO-8859-1 zu UTF-8)
                return decoded
                    .replace(/Ã¤/g, 'ä').replace(/Ã¶/g, 'ö').replace(/Ã¼/g, 'ü')
                    .replace(/Ã„/g, 'Ä').replace(/Ã–/g, 'Ö').replace(/Ãœ/g, 'Ü')
                    .replace(/ÃŸ/g, 'ß').replace(/Â/g, '').replace(/â€“/g, '–');
            } catch (e) { return text; }
        };

        function App() {
            const [cat, setCat] = useState("Politik");
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(false);

            const loadNews = async (category) => {
                setLoading(true);
                let all = [];
                for (const feed of FEEDS[category]) {
                    try {
                        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(feed.u)}`;
                        const res = await fetch(proxyUrl);
                        const buffer = await res.arrayBuffer();
                        
                        // Versuche Text als UTF-8 zu lesen
                        const decoder = new TextDecoder('utf-8');
                        const xmlText = decoder.decode(buffer);
                        
                        const doc = new DOMParser().parseFromString(xmlText, "text/xml");
                        const entries = Array.from(doc.querySelectorAll("item, entry"));

                        const parsed = entries.map(e => ({
                            title: fixEncoding(e.querySelector("title")?.textContent || ""),
                            link: e.querySelector("link")?.textContent || e.querySelector("link")?.getAttribute("href") || "#",
                            desc: fixEncoding(e.querySelector("description")?.textContent || e.querySelector("summary")?.textContent || "").replace(/<[^>]*>?/gm, '').substring(0, 200),
                            src: feed.n,
                            date: new Date(e.querySelector("pubDate, published, updated")?.textContent).getTime() || Date.now()
                        }));
                        all = [...all, ...parsed];
                    } catch (err) { console.error(err); }
                }
                setItems(all.sort((a, b) => b.date - a.date));
                setLoading(false);
            };

            useEffect(() => { loadNews(cat); }, [cat]);

            return (
                <div className="page">
                    <div className="ticker-wrap">
                        <div className="ticker">
                            {items.length > 0 ? items.concat(items).map((it, i) => (
                                <span key={i}>+++ {it.title} +++</span>
                            )) : <span>Lade aktuelle Meldungen...</span>}
                        </div>
                    </div>

                    <header>
                        <h1 className="masthead">Souverän</h1>
                        <div className="sub-header">
                            <span>10. MÄRZ 2026</span>
                            <span>STUTTGART • 11°C</span>
                            <span>NR. 01 / DIGITALE AUSGABE</span>
                        </div>
                    </header>
                    
                    <nav>
                        {Object.keys(FEEDS).map(c => (
                            <button key={c} className={cat === c ? "active" : ""} onClick={() => setCat(c)}>{c}</button>
                        ))}
                    </nav>

                    {loading && <div className="loading-bar"></div>}

                    <div className="content-grid">
                        <main>
                            {items.slice(0, 12).map((it, i) => (
                                <div key={i} className="article">
                                    <span className="article-source">{it.src}</span>
                                    <h3><a href={it.link} target="_blank" rel="noreferrer">{it.title}</a></h3>
                                    <p>{it.desc}...</p>
                                    <small style={{color: '#777', fontStyle: 'italic'}}>{new Date(it.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} Uhr</small>
                                </div>
                            ))}
                        </main>
                        
                        <aside>
                            <div className="sidebar-title">Weitere Meldungen</div>
                            {items.slice(12, 25).map((it, i) => (
                                <div key={i} className="sidebar-item">
                                    <span className="article-source" style={{fontSize: '0.55rem'}}>{it.src}</span>
                                    <a href={it.link} target="_blank" rel="noreferrer">{it.title}</a>
                                </div>
                            ))}
                        </aside>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
